<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapper — English Tutor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <h1>🎙️ Yapper</h1>
      <div id="indicators">
        <span class="indicator" id="ind-whisper">🔴 Whisper</span>
        <span class="indicator" id="ind-ollama">🔴 Ollama</span>
        <span class="indicator" id="ind-mic">⚪ Mic</span>
        <span class="indicator" id="ind-ws">🔴 Server</span>
      </div>
    </header>

    <!-- Profile setup (shown if no profile) -->
    <div id="profile-setup" class="panel hidden">
      <h2>Welcome to Yapper!</h2>
      <p>Let's set up your profile first.</p>
      <div class="form-group">
        <label>Your name:</label>
        <input type="text" id="p-name" placeholder="Denis">
      </div>
      <div class="form-group">
        <label>Session duration:</label>
        <select id="p-duration">
          <option value="15">15 minutes</option>
          <option value="20" selected>20 minutes</option>
          <option value="30">30 minutes</option>
          <option value="45">45 minutes</option>
        </select>
      </div>
      <div class="form-group">
        <label>Preferred topics (comma separated):</label>
        <input type="text" id="p-topics" placeholder="travel, technology, daily life">
      </div>
      <div class="form-group">
        <label>Professional / special topics:</label>
        <input type="text" id="p-prof" placeholder="IT, fishing, accounting">
      </div>
      <button id="btn-save-profile" class="btn-primary">Create Profile</button>
    </div>

    <!-- Main UI -->
    <div id="main-ui" class="hidden">

      <!-- Session controls -->
      <div id="controls" class="panel">
        <div class="control-row">
          <div class="form-group">
            <label>Topic:</label>
            <select id="topic-select"></select>
          </div>
          <button id="btn-start" class="btn-primary">▶ Start Session</button>
          <button id="btn-stop" class="btn-danger hidden">⏹ Stop Session</button>
          <button id="btn-progress" class="btn-secondary">📊 Progress</button>
        </div>
        <div id="session-info" class="hidden">
          <span id="session-topic">Topic: —</span>
          <span id="session-time">0:00</span>
        </div>
      </div>

      <!-- Mic button -->
      <div id="mic-area" class="panel hidden">
        <button id="btn-mic" class="btn-mic">🎤 Hold to Speak</button>
        <button id="btn-vocab" class="btn-secondary" title="Flag vocabulary gap (F9)">📝 Vocab Gap</button>
        <div id="mic-status">Ready</div>
      </div>

      <!-- Conversation -->
      <div id="conversation" class="panel">
        <div id="messages"></div>
      </div>

      <!-- Progress panel -->
      <div id="progress-panel" class="panel hidden">
        <h3>Your Progress</h3>
        <pre id="progress-text"></pre>
        <button id="btn-close-progress" class="btn-secondary">Close</button>
      </div>

    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
